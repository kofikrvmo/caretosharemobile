name: caretosharemobile
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # Code Generation Annotations
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  
  # Local Storage
  shared_preferences: ^2.2.3
  
  # HTTP and Network
  http: ^1.2.0
  http_parser: ^4.0.2
  mime: ^1.0.5
  
  # UI and Styling
  cached_network_image: ^3.3.1
  get_it: ^8.0.3
  flutter_svg: ^2.1.0
  image_picker: ^1.1.2
  shimmer: ^3.0.0
  intl: ^0.19.0
  # State Management
  flutter_bloc: ^8.1.6 
  bloc: ^8.1.4  
  equatable: ^2.0.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Aptos
      fonts:
        - asset: assets/fonts/Aptos.ttf
        - asset: assets/fonts/Aptos-Bold.ttf
          weight: 700
        - asset: assets/fonts/Aptos-Bold-Italic.ttf
          weight: 700
          style: italic
        - asset: assets/fonts/Aptos-Italic.ttf
          style: italic
        - asset: assets/fonts/Aptos-Light.ttf
          weight: 300
        - asset: assets/fonts/Aptos-Light-Italic.ttf
          weight: 300
          style: italic
        - asset: assets/fonts/Aptos-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Aptos-SemiBold-Italic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Aptos-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Aptos-ExtraBold-Italic.ttf
          weight: 800
          style: italic
        - asset: assets/fonts/Aptos-Black.ttf
          weight: 900
        - asset: assets/fonts/Aptos-Black-Italic.ttf
          weight: 900
          style: italic